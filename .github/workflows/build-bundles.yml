name: Build and Upload Penpot Bundles

on:
  workflow_dispatch:
    inputs:
      zip_mode:
        description: 'Bundle packaging mode'
        required: false
        default: 'individual'
        type: choice
        options:
          - individual
          - all
  schedule:
    - cron: '30 7 * * 1-5'
    - cron: '30 8 * * 1-5'
    - cron: '30 9 * * 1-5'
    - cron: '30 10 * * 1-5'
    - cron: '30 11 * * 1-5'
    - cron: '30 12 * * 1-5'
    - cron: '30 13 * * 1-5'
    - cron: '30 14 * * 1-5'
    - cron: '30 15 * * 1-5'
    - cron: '30 16 * * 1-5'
    - cron: '30 17 * * 1-5'
    - cron: '30 18 * * 1-5'

jobs:
  check-develop:
    name: Check for new commits in develop
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check.outputs.skip }}
      commit_count: ${{ steps.check.outputs.commit_count }}

    steps:
      # Prepare a local git repo and fetch origin/develop
      - name: Prepare repository with remote
        run: |
          git init
          git remote add origin https://github.com/${{ github.repository }}.git
          git fetch origin develop
          git checkout origin/develop

      # Compare current HEAD with origin/develop to detect new commits
      - name: Check if HEAD is behind origin/develop
        id: check
        run: |
          git fetch origin develop
          LOCAL=$(git rev-parse HEAD)
          REMOTE=$(git rev-parse origin/develop)
          echo "Local:  $LOCAL"
          echo "Remote: $REMOTE"

          if [ "$LOCAL" = "$REMOTE" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "commit_count=0" >> $GITHUB_OUTPUT
          else
            COUNT=$(git rev-list $LOCAL..$REMOTE --count)
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "commit_count=$COUNT" >> $GITHUB_OUTPUT
          fi

      # Log message when no new commits are found
      - name: "Log - No new commits found"
        if: ${{ steps.check.outputs.skip == 'true' }}
        run: echo "⏹️ No new commits in develop. Skipping build-bundles job."

  build-bundles:
    name: Build and Upload Penpot Bundles
    needs: check-develop
    if: ${{ needs.check-develop.outputs.skip == 'false' }}
    runs-on: ubuntu-latest

    steps:
      # Export commit count for use in later steps
      - name: Export commit count to env
        run: echo "COMMIT_COUNT=${{ needs.check-develop.outputs.commit_count }}" >> $GITHUB_ENV

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0

      # Read zip mode input or fallback to 'individual'
      - name: Determine ZIP_MODE
        id: mode
        run: echo "ZIP_MODE=${{ github.event.inputs.zip_mode || 'individual' }}" >> $GITHUB_ENV

      # Set up Docker Buildx for multi-arch build
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build CI builder image
      - name: Build Penpot CI Builder Image
        run: |
          docker build \
            --build-arg EXTERNAL_UID=1000 \
            --build-arg EXTERNAL_GID=1000 \
            -t penpotapp/penpot-ci-builder:latest \
            -f docker/devenv/Dockerfile \
            docker/devenv

      # Build the frontend, backend, and exporter bundles
      - name: Run manage.sh build-bundle from host
        run: ./manage.sh build-bundle

      # Zip the bundles
      - name: Create zip bundles
        run: |
          echo "📦 Packaging Penpot bundles..."
          mkdir -p zips temp

          if [[ "${ZIP_MODE}" == "all" ]]; then
            mkdir -p temp/penpot-all/{penpot-frontend,penpot-backend,penpot-exporter}
            cp -r bundles/frontend/* temp/penpot-all/penpot-frontend/
            cp -r bundles/backend/* temp/penpot-all/penpot-backend/
            cp -r bundles/exporter/* temp/penpot-all/penpot-exporter/
            cd temp
            zip -r ../zips/penpot-all-bundles.zip penpot-all
          else
            for component in frontend backend exporter; do
              name="penpot-${component}"
              mkdir -p temp/${name}
              cp -r bundles/${component}/* temp/${name}/
            done
            cd temp
            for name in penpot-frontend penpot-backend penpot-exporter; do
              zip -r ../zips/${name}.zip ${name}
            done
          fi

      # Upload zipped artifacts to GitHub
      - name: Upload unified bundle
        if: ${{ env.ZIP_MODE == 'all' }}
        uses: actions/upload-artifact@v4
        with:
          name: penpot-all-bundles
          path: zips/penpot-all-bundles.zip

      - name: Upload frontend bundle
        if: ${{ env.ZIP_MODE != 'all' }}
        uses: actions/upload-artifact@v4
        with:
          name: penpot-frontend
          path: zips/penpot-frontend.zip

      - name: Upload backend bundle
        if: ${{ env.ZIP_MODE != 'all' }}
        uses: actions/upload-artifact@v4
        with:
          name: penpot-backend
          path: zips/penpot-backend.zip

      - name: Upload exporter bundle
        if: ${{ env.ZIP_MODE != 'all' }}
        uses: actions/upload-artifact@v4
        with:
          name: penpot-exporter
          path: zips/penpot-exporter.zip

      # Upload the bundles to S3 and generate presigned download links
      - name: Upload bundles to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
        run: |
          FECHA=$(date +%F)
          MODO="${ZIP_MODE}"
          if [[ "$MODO" == "all" ]]; then
            aws s3 cp zips/penpot-all-bundles.zip s3://${{ secrets.S3_DEV_BUCKET }}/$FECHA/all/penpot-all-bundles.zip
          else
            for file in penpot-frontend.zip penpot-backend.zip penpot-exporter.zip; do
              aws s3 cp zips/$file s3://${{ secrets.S3_DEV_BUCKET }}/$FECHA/individual/$file
            done
          fi

      - name: Generate presigned URLs
        id: presign
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
        run: |
          FECHA=$(date +%F)
          MODO="${ZIP_MODE}"
          echo "" > urls.txt
          echo "📥 Download links valid for 24h:" >> urls.txt
          if [[ "$MODO" == "all" ]]; then
            LINK=$(aws s3 presign s3://${{ secrets.S3_DEV_BUCKET }}/$FECHA/all/penpot-all-bundles.zip --expires-in 86400)
            echo "- [penpot-all-bundles.zip]($LINK)" >> urls.txt
          else
            for file in penpot-frontend.zip penpot-backend.zip penpot-exporter.zip; do
              LINK=$(aws s3 presign s3://${{ secrets.S3_DEV_BUCKET }}/$FECHA/individual/$file --expires-in 86400)
              echo "- [$file]($LINK)" >> urls.txt
            done
          fi

      # Notify Mattermost with bundle info and presigned URLs
      - name: Notify Mattermost (only if new commits)
        if: ${{ env.COMMIT_COUNT != '0' }}
        run: |
          FECHA=$(date +%F)
          LINKS=$(cat urls.txt | sed ':a;N;$!ba;s/\n/\\n/g')
          curl -X POST -H 'Content-Type: application/json' -d "{
            \"text\": \"📦 *Penpot bundle generated*\n🔄 Detected *${COMMIT_COUNT}* new commit(s) on \`develop\`\n👤 Notified: @francis\n${LINKS}\n🔗 [View GitHub run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})\"
          }" ${{ secrets.MATTERMOST_WEBHOOK }}

      # Print summary of the artifacts
      - name: Print artifact summary URL
        run: |
          echo "📦 Artifacts available at:"
          echo "🔗 https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
